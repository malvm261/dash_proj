<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распределённое вычисление π</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Распределённое вычисление числа π</h1>
            <p>Сервер: <span id="serverStatus">●</span> Активен</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="totalIterations">Всего итераций:</label>
                <input type="number" id="totalIterations" value="1000000000" step="10000000">
            </div>
            <div class="control-group">
                <label for="chunkSize">Размер блока:</label>
                <input type="number" id="chunkSize" value="10000000" step="1000000">
            </div>
            <button id="resetBtn" class="btn btn-reset">🔄 Начать заново</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Прогресс</div>
                <div class="stat-value" id="progress">0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Блоков завершено</div>
                <div class="stat-value" id="completedChunks">0 / 0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">π (Лейбниц)</div>
                <div class="stat-value mono" id="pi1">—</div>
                <div class="stat-error" id="error1">—</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">π (Нилаканта)</div>
                <div class="stat-value mono" id="pi2">—</div>
                <div class="stat-error" id="error2">—</div>
            </div>
        </div>

        <div class="section">
            <h2>📊 График сходимости</h2>
            <div class="chart-container">
                <canvas id="piChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>🖥️ Подключённые клиенты</h2>
            <div id="clientsList" class="clients-list">
                <p class="placeholder">Ожидание клиентов...</p>
            </div>
        </div>

        <div class="section">
            <h2>📋 Лог сервера</h2>
            <div id="log" class="log-container"></div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
